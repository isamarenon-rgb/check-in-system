<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อ อบจ.น่าน 3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="bgOverlay"></div>
    <div id="app">
        <div id="digitalClock"></div>
        
        <div id="loginPage" class="page active">
            <div class="card">
                <img id="appLogo" src="" alt="Logo">
                <h2 style="margin-top:20px;">ระบบเช็คชื่อนักเรียน</h2>
                <p style="color:#666;">โรงเรียนองค์การบริหารส่วนจังหวัดน่าน 3 สารธรรม</p>
                <input type="password" id="pinInput" placeholder="กรอกรหัสผ่าน">
                <button onclick="handleLogin()" class="save-btn">เข้าสู่ระบบ</button>
                <p id="loginError" style="color:red; font-size:0.9rem;"></p>
            </div>
        </div>

        <div id="gradePage" class="page">
            <div class="card" style="margin-top:20px; padding:30px;">
                <h3 style="margin-top:0;">เลือกชั้นเรียน</h3>
                <div class="grade-grid">
                    <button onclick="selectGrade('M1')" class="grade-btn">ม.1</button>
                    <button onclick="selectGrade('M2')" class="grade-btn">ม.2</button>
                    <button onclick="selectGrade('M3')" class="grade-btn">ม.3</button>
                    <button onclick="selectGrade('M4')" class="grade-btn">ม.4</button>
                    <button onclick="selectGrade('M5')" class="grade-btn">ม.5</button>
                    <button onclick="selectGrade('M6')" class="grade-btn">ม.6</button>
                </div>
                <button onclick="viewAbsenteeReport()" class="secondary-btn">📄 ดูประวัติ / โหลด Excel</button>
                <button onclick="handleLogout()" style="background:none; color:#999; margin-top:15px; font-size:0.9rem;">ออกจากระบบ</button>
            </div>
        </div>

        <div id="attendancePage" class="page">
            <h3 id="targetGrade" style="text-align:center; color:white;"></h3>
            <div id="studentList"></div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="goBack()" style="background:#666; color:white; flex:1;">ย้อนกลับ</button>
                <button onclick="confirmSave()" class="save-btn" style="flex:2; margin-top:0;">บันทึกข้อมูล</button>
            </div>
        </div>

        <div id="absenteePage" class="page">
            <div class="card" style="margin-top:20px;">
                <div id="absenteeList"></div>
            </div>
        </div>

        <div id="adminPage" class="page">
            <div class="card" style="margin-top:20px;">
                <h3>⚙️ ตั้งค่าระบบ (Admin)</h3>
                <div id="masterRecdList"></div>
                <button onclick="goBack()" class="secondary-btn">กลับหน้าหลัก</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
