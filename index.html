<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<div id="bgOverlay"></div>
<div class="container">
    <div id="loginPage" class="page active">
        <div class="glass-card">
            <img id="appLogo" src="https://via.placeholder.com/80" alt="Logo">
            <h1>Student Check-in</h1>
            <div class="input-wrapper">
                <input type="password" id="pinInput" placeholder="Security PIN">
            </div>
            <p id="loginError" style="color: #ff5252; font-size: 0.8rem; margin: 10px 0;"></p>
            <button onclick="handleLogin()" class="btn-primary">Login</button>
        </div>
    </div>

    <div id="gradePage" class="page">
        <div class="glass-card">
            <div id="digitalClock">00:00:00</div>
            <div class="grade-grid">
                <button onclick="selectGrade('M1')">M.1</button>
                <button onclick="selectGrade('M2')">M.2</button>
                <button onclick="selectGrade('M3')">M.3</button>
                <button onclick="selectGrade('M4')">M.4</button>
                <button onclick="selectGrade('M5')">M.5</button>
                <button onclick="selectGrade('M6')">M.6</button>
            </div>
            <button onclick="viewAbsenteeReport()" class="btn-secondary">View Report / Download</button>
            <button onclick="handleLogout()" class="btn-text">Logout</button>
        </div>
    </div>

    <div id="attendancePage" class="page">
        <h2 id="targetGrade"></h2>
        <div id="studentList"></div>
        <div class="footer-btns">
            <button onclick="goBack()" class="btn-secondary">Back</button>
            <button onclick="confirmSave()" class="btn-primary" style="margin-top:10px;">Save to Cloud</button>
        </div>
    </div>

    <div id="absenteePage" class="page">
        <div class="glass-card">
            <h2>Daily Report</h2>
            <button onclick="downloadExcel()" class="btn-download">Download XLSX</button>
            <div id="absenteeList"></div>
            <button onclick="goBack()" class="btn-secondary">Back</button>
        </div>
    </div>

    <div id="adminPage" class="page">
        <div class="glass-card">
            <h2>Admin Setup</h2>
            <input type="file" id="logoUpload" accept="image/*" style="margin-bottom:10px;">
            <input type="file" id="bgUpload" accept="image/*" style="margin-bottom:10px;">
            <button onclick="updateAssets()" class="btn-primary">Apply Assets</button>
            <div id="masterRecdList" style="margin-top:20px; max-height:200px; overflow-y:auto;"></div>
            <button onclick="handleLogout()" class="btn-secondary">Logout</button>
        </div>
    </div>
</div>
