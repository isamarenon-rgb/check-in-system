<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คชื่อ อบจ.น่าน 3</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="bgOverlay"></div>
    <div id="app">
        <div id="digitalClock"></div>
        
        <div id="loginPage" class="page active">
            <div class="card">
                <img id="appLogo" src="" alt="Logo">
                <h2>ระบบเช็คชื่อนักเรียน</h2>
                <input type="password" id="pinInput" placeholder="กรอกรหัสผ่าน">
                <button onclick="handleLogin()">เข้าสู่ระบบ</button>
                <p id="loginError"></p>
            </div>
        </div>

        <div id="gradePage" class="page">
            <div class="grade-grid">
                <button onclick="selectGrade('M1')" class="grade-btn">ม.1</button>
                <button onclick="selectGrade('M2')" class="grade-btn">ม.2</button>
                <button onclick="selectGrade('M3')" class="grade-btn">ม.3</button>
                <button onclick="selectGrade('M4')" class="grade-btn">ม.4</button>
                <button onclick="selectGrade('M5')" class="grade-btn">ม.5</button>
                <button onclick="selectGrade('M6')" class="grade-btn">ม.6</button>
            </div>
            <button onclick="viewAbsenteeReport()" class="secondary-btn">ดูประวัติวันนี้ / โหลด Excel</button>
            <button onclick="handleLogout()" class="text-btn">ออกจากระบบ</button>
        </div>

        <div id="attendancePage" class="page">
            <h3 id="targetGrade"></h3>
            <div id="studentList"></div>
            <div class="btn-group">
                <button onclick="goBack()" class="back-btn">ย้อนกลับ</button>
                <button onclick="confirmSave()" class="save-btn">บันทึกข้อมูล</button>
            </div>
        </div>

        <div id="absenteePage" class="page">
            <div id="absenteeList"></div>
        </div>

        <div id="adminPage" class="page">
            <div class="card">
                <h3>⚙️ ตั้งค่าระบบ (Admin)</h3>
                <div style="text-align:left; margin-bottom:20px; padding:15px; background:#f9f9f9; border-radius:12px;">
                    <label style="display:block; font-size:0.85rem; font-weight:bold; margin-bottom:5px;">เปลี่ยนโลโก้ใหม่:</label>
                    <input type="file" id="logoUpload" accept="image/*" onchange="updateAssets()">
                    <label style="display:block; font-size:0.85rem; font-weight:bold; margin-top:10px; margin-bottom:5px;">เปลี่ยนพื้นหลังใหม่:</label>
                    <input type="file" id="bgUpload" accept="image/*" onchange="updateAssets()">
                </div>
                <div id="masterRecdList"></div>
                <button onclick="handleLogout()" class="text-btn">กลับหน้าล็อกอิน</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
